<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Download BrazilDecoded PDF</title>
    <meta
      name="description"
      content="Redirecting to your secure BrazilDecoded download link."
    />
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #111827;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }

      .page {
        width: min(680px, 100%);
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
        padding: 2rem;
      }

      .hero {
        display: grid;
        gap: 1.5rem;
      }

      .eyebrow {
        font-size: 0.875rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #6366f1;
        margin: 0;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.03;
      }

      .lead {
        margin: 0;
        font-size: 1rem;
        line-height: 1.8;
        color: #4b5563;
      }

      .status-card {
        display: grid;
        gap: 1rem;
        padding: 1.75rem;
        border-radius: 18px;
        background: #f8fafc;
        border: 1px solid #e5e7eb;
      }

      .status-card strong {
        color: #111827;
      }

      .status-message {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 600;
        color: #111827;
      }

      .status-note {
        margin: 0;
        color: #6b7280;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 1rem 1.5rem;
        border-radius: 999px;
        border: none;
        background: #4338ca;
        color: #ffffff;
        font-size: 1rem;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
      }

      .button:hover,
      .button:focus-visible {
        transform: translateY(-1px);
        box-shadow: 0 16px 40px rgba(67, 56, 202, 0.18);
        background: #3730a3;
        outline: none;
      }

      .button.hidden {
        display: none;
      }

      .spinner {
        width: 2rem;
        height: 2rem;
        border: 4px solid #e5e7eb;
        border-top-color: #4338ca;
        border-radius: 50%;
        animation: spin 0.85s linear infinite;
      }

      .spinner-row {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
      }

      .help-text {
        margin: 0;
        color: #6b7280;
        font-size: 0.95rem;
      }

      .error {
        color: #b91c1c;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 520px) {
        .page {
          padding: 1.5rem;
        }
      }
    </style>
  </head>

  <body>
    <main class="page" id="maincontent">
      <section class="hero" aria-labelledby="page-title">
        <p class="eyebrow">Secure download</p>
        <h1 id="page-title">Your BrazilDecoded download is ready</h1>
        <p class="lead">
          We are preparing your secure file. If the page does not redirect in a
          moment, use the button below.
        </p>
      </section>

      <section class="status-card" aria-live="polite">
        <div class="spinner-row">
          <div class="spinner" aria-hidden="true"></div>
          <p class="status-message" id="statusMessage">Checking your download link…</p>
        </div>
        <p class="status-note" id="noteText">
          This page validates your token before redirecting you to the secure download URL.
        </p>
        <a id="downloadButton" class="button hidden" role="button">Download now</a>
      </section>
    </main>

    <script>
      const workerBase = 'https://brazildecoded-download-worker.rodcafonte.workers.dev/';
      const statusMessage = document.getElementById('statusMessage');
      const noteText = document.getElementById('noteText');
      const downloadButton = document.getElementById('downloadButton');

      function getQueryParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name);
      }

      function isValidToken(value) {
        return typeof value === 'string' && /^[A-Za-z0-9_-]+$/.test(value);
      }

      function fireGtagEvent(eventName, eventLabel) {
        try {
          if (typeof gtag === 'function') {
            gtag('event', eventName, {
              event_label: eventLabel,
              event_category: 'download',
            });
          }
        } catch (error) {
          // Ignore analytics failures on this redirect page.
        }
      }

      function showError(message) {
        statusMessage.textContent = message;
        statusMessage.classList.add('error');
        noteText.textContent = 'Return to the email link and try again with a valid download token.';
        downloadButton.classList.add('hidden');
      }

      function startRedirect(token) {
        const redirectUrl = `${workerBase}?token=${encodeURIComponent(token)}`;
        downloadButton.href = redirectUrl;
        downloadButton.classList.remove('hidden');
        downloadButton.setAttribute('target', '_self');
        downloadButton.setAttribute('rel', 'noopener');
        downloadButton.focus();

        fireGtagEvent('download_page_view', 'download_token');

        setTimeout(() => {
          statusMessage.textContent = 'Preparing your download...';
          window.location.href = redirectUrl;
        }, 2000);
      }

      const token = getQueryParam('token');

      if (!isValidToken(token)) {
        showError('Invalid or missing download token.');
      } else {
        startRedirect(token);
      }
    </script>
  </body>
</html>
