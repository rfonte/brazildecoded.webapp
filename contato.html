<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Contato — BrazilDecoded</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <a class="skip-link" href="#maincontent">Pular para o conteúdo</a>
    <header class="site-header">
      <div class="container">
        <a class="brand" href="index.html">BrazilDecoded</a>
        <nav class="main-nav" role="navigation" aria-label="Menu principal">
          <a href="index.html">Início</a>
          <a href="contato.html">Contato</a>
          <a href="cadastro.html">Cadastre-se</a>
        </nav>
      </div>
    </header>

    <main id="maincontent" class="container" role="main">
      <h1>Contato</h1>
      <p>
        Envie sua mensagem usando o formulário abaixo ou escreva para
        <a href="mailto:contato@brazildecoded.example"
          >contato@brazildecoded.example</a
        >.
      </p>

      <form id="contactForm">
        <label for="name">Nome</label>
        <input id="name" name="name" type="text" required />

        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" required />

        <label for="message">Mensagem</label>
        <textarea id="message" name="message" rows="6" required></textarea>

        <!-- Honeypot anti-bot field (hidden via CSS) -->
        <label class="hp" style="display: none"
          >Se você é humano, deixe este campo em branco:
          <input id="hp_contact" name="hp_contact" type="text"
        /></label>

        <button type="submit">Enviar</button>
        <p class="form-feedback" id="contactFeedback" aria-live="polite"></p>
      </form>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; 2026 BrazilDecoded.</p>
      </div>
    </footer>

    <script src="assets/script.js"></script>
  </body>
</html>
